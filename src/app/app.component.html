<style>
  :host {
    --bright-blue: oklch(51.01% 0.274 263.83);
    --electric-violet: oklch(53.18% 0.28 296.97);
    --french-violet: oklch(47.66% 0.246 305.88);
    --vivid-pink: oklch(69.02% 0.277 332.77);
    --hot-red: oklch(61.42% 0.238 15.34);
    --orange-red: oklch(63.32% 0.24 31.68);

    --gray-900: oklch(19.37% 0.006 300.98);
    --gray-700: oklch(36.98% 0.014 302.71);
    --gray-400: oklch(70.9% 0.015 304.04);

    --red-to-pink-to-purple-vertical-gradient: linear-gradient(
      180deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    --red-to-pink-to-purple-horizontal-gradient: linear-gradient(
      90deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    --pill-accent: var(--bright-blue);

    font-family:
      "Inter",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Helvetica,
      Arial,
      sans-serif,
      "Apple Color Emoji",
      "Segoe UI Emoji",
      "Segoe UI Symbol";
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1 {
    font-size: 3.125rem;
    color: var(--gray-900);
    font-weight: 500;
    line-height: 100%;
    letter-spacing: -0.125rem;
    margin: 0;
    font-family:
      "Inter Tight",
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Helvetica,
      Arial,
      sans-serif,
      "Apple Color Emoji",
      "Segoe UI Emoji",
      "Segoe UI Symbol";
  }

  p {
    margin: 0;
    color: var(--gray-700);
  }

  main {
    width: 100%;
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
    box-sizing: inherit;
    position: relative;
  }

  .angular-logo {
    max-width: 9.2rem;
  }

  .content {
    display: flex;
    justify-content: space-around;
    width: 100%;
    max-width: 700px;
    margin-bottom: 3rem;
  }

  .content h1 {
    margin-top: 1.75rem;
  }

  .content p {
    margin-top: 1.5rem;
  }

  .divider {
    width: 1px;
    background: var(--red-to-pink-to-purple-vertical-gradient);
    margin-inline: 0.5rem;
  }

  .pill-group {
    display: flex;
    flex-direction: column;
    align-items: start;
    flex-wrap: wrap;
    gap: 1.25rem;
  }

  .pill {
    display: flex;
    align-items: center;
    --pill-accent: var(--bright-blue);
    background: color-mix(in srgb, var(--pill-accent) 5%, transparent);
    color: var(--pill-accent);
    padding-inline: 0.75rem;
    padding-block: 0.375rem;
    border-radius: 2.75rem;
    border: 0;
    transition: background 0.3s ease;
    font-family: var(--inter-font);
    font-size: 0.875rem;
    font-style: normal;
    font-weight: 500;
    line-height: 1.4rem;
    letter-spacing: -0.00875rem;
    text-decoration: none;
  }

  .pill:hover {
    background: color-mix(in srgb, var(--pill-accent) 15%, transparent);
  }

  .pill-group .pill:nth-child(6n + 1) {
    --pill-accent: var(--bright-blue);
  }
  .pill-group .pill:nth-child(6n + 2) {
    --pill-accent: var(--french-violet);
  }
  .pill-group .pill:nth-child(6n + 3),
  .pill-group .pill:nth-child(6n + 4),
  .pill-group .pill:nth-child(6n + 5) {
    --pill-accent: var(--hot-red);
  }

  .pill-group svg {
    margin-inline-start: 0.25rem;
  }

  .social-links {
    display: flex;
    align-items: center;
    gap: 0.73rem;
    margin-top: 1.5rem;
  }

  .social-links path {
    transition: fill 0.3s ease;
    fill: var(--gray-400);
  }

  .social-links a:hover svg path {
    fill: var(--gray-900);
  }

  @media screen and (max-width: 650px) {
    .content {
      flex-direction: column;
      width: max-content;
    }

    .divider {
      height: 1px;
      width: 100%;
      background: var(--red-to-pink-to-purple-horizontal-gradient);
      margin-block: 1.5rem;
    }
  }
</style>

<main class="main">
  <div class="container">
    <h1>{{ title }}</h1>
    <ngb-alert type="success" *ngIf="msg != ''" (close)="msg = ''">
      {{ msg }}
    </ngb-alert>
    <button class="btn btn-primary mb-3" (click)="abrirFormulario()">
      Crear nuevo
    </button>

    <form class="card mb-3" *ngIf="mostrarFormulario" #listaForm="ngForm" (ngSubmit)="guardarLista(listaForm)">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label" for="nombre">Nombre *</label>
          <input
            class="form-control"
            [ngClass]="{ 'is-invalid': nombreRef.invalid && nombreRef.touched }"
            id="nombre"
            name="nombre"
            type="text"
            [(ngModel)]="nueva.nombre"
            #nombreRef="ngModel"
            required
            minlength="3"
          />
          <div class="invalid-feedback" *ngIf="nombreRef.errors?.['required'] && nombreRef.touched">
            El nombre es obligatorio.
          </div>
          <div class="invalid-feedback" *ngIf="nombreRef.errors?.['minlength'] && nombreRef.touched">
            El nombre debe tener al menos 3 caracteres.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="descripcion">Descripcion *</label>
          <textarea
            class="form-control"
            [ngClass]="{ 'is-invalid': descripcionRef.invalid && descripcionRef.touched }"
            id="descripcion"
            name="descripcion"
            [(ngModel)]="nueva.descripcion"
            #descripcionRef="ngModel"
            required
            minlength="5"
          ></textarea>
          <div class="invalid-feedback" *ngIf="descripcionRef.errors?.['required'] && descripcionRef.touched">
            La descripción es obligatoria.
          </div>
          <div class="invalid-feedback" *ngIf="descripcionRef.errors?.['minlength'] && descripcionRef.touched">
            La descripción debe tener al menos 5 caracteres.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="color">Color</label>
          <select
            class="form-select"
            id="color"
            name="color"
            [(ngModel)]="nueva.color"
          >
            <option value="bg-primary text-white">Azul</option>
            <option value="bg-success text-white">Verde</option>
            <option value="bg-warning text-dark">Amarillo</option>
            <option value="bg-danger text-white">Rojo</option>
          </select>
        </div>

        <div class="mb-3 text-muted">Los campos marcados con * son obligatorios.</div>

        <button class="btn btn-success me-2" type="submit" [disabled]="listaForm.invalid">Guardar</button>
        <button class="btn btn-secondary" type="button" (click)="cancelarFormulario()">
          Cancelar
        </button>
      </div>
    </form>

    <div class="card mb-2" *ngFor="let item of listas">
      <app-lista 
        [lista]="item"
        (eliminar)="eliminarLista($event)"
        (editar)="editarLista($event)">
      </app-lista>
    </div>
  </div>
</main>

<router-outlet />
