<div class="card mb-2" [ngClass]="lista.color">
  <!-- Vista Resumida -->
  <div class="card-body" *ngIf="!mostrarDetalle">
    <h5 class="card-title">{{ lista.nombre }}</h5>
    <p class="card-text text-truncate">{{ lista.descripcion }}</p>
    <button class="btn btn-light me-2" (click)="verDetalle()">Ver detalle</button>
    <button class="btn btn-light me-2" (click)="editarLista()">Modificar</button>
    <button class="btn btn-light" (click)="abrirModalEliminar()">Eliminar</button>
  </div>

  <!-- Vista Detalle -->
  <div class="card-body" *ngIf="mostrarDetalle">
    <h5 class="card-title">{{ lista.nombre }}</h5>
    <p class="card-text">{{ lista.descripcion }}</p>

    <h6 class="mt-3 mb-2">Tareas:</h6>
    <select class="form-select mb-3 w-auto" [(ngModel)]="filtroTareas">
      <option value="todas">Todas las tareas</option>
      <option value="acabadas">Solo acabadas</option>
      <option value="noacabadas">Solo no acabadas</option>
    </select>
    <ul class="list-group list-group-flush">
      <app-tarea
        *ngFor="let tarea of tareasFiltradas"
        [tarea]="tarea"
        (toggle)="toggleTarea($event)">
      </app-tarea>
    </ul>

    <button class="btn btn-secondary mt-3" (click)="ocultarDetalle()">Volver al listado</button>
  </div>
</div>

<!-- Modal de confirmación de eliminación -->
<ng-template #modalEliminar let-modal>
  <div class="modal-header">
    <h4 class="modal-title">Confirmar eliminación</h4>
    <button type="button" class="btn-close" (click)="cancelarEliminar()"></button>
  </div>
  <div class="modal-body">
    ¿Estás seguro de que deseas eliminar la lista "<strong>{{ lista.nombre }}</strong>"?
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="cancelarEliminar()">Cancelar</button>
    <button type="button" class="btn btn-danger" (click)="confirmarEliminar()">Eliminar</button>
  </div>
</ng-template>
